name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-check:
    name: Lint, Typecheck, Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run Tests
        run: npm run test

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info

  build:
    name: Build Next.js
    runs-on: ubuntu-latest
    needs: quality-check

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Cache Next.js
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ hashFiles('**/package-lock.json') }}

      - run: npm run build

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next

  e2e:
    name: Playwright Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test

  lighthouse:
    name: Lighthouse Performance
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build
      - run: npm run lhci

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse
          path: .lighthouseci/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: quality-check

    steps:
      - uses: actions/checkout@v4

      - name: Run audit
        run: npm audit --audit-level=critical

      - name: Secret scanning
        uses: gitleaks/gitleaks-action@v2

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [e2e, lighthouse, security]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t nextjs-app .

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Deploy
        run: echo "Deploying application..."
